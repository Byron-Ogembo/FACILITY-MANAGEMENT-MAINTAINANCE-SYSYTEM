{% extends "base.html" %}
{% block full_page %}
<div class="min-vh-100 d-flex align-items-center justify-content-center py-5" style="background: linear-gradient(135deg, #0d1117 0%, #161b22 100%);">
    <div class="card shadow-lg border-0" style="max-width: 480px; width: 100%;">
        <div class="card-body p-5">
            <h2 class="brand-gradient mb-1">Register</h2>
            <p class="text-muted mb-4">Create your CMMS account</p>
            {% with messages = get_flashed_messages(with_categories=true) %}
            {% for category, msg in messages %}
            <div class="alert alert-{{ category }}">{{ msg }}</div>
            {% endfor %}
            {% endwith %}
            <form method="POST" action="{{ url_for('auth.register') }}">
                <div class="mb-3">
                    <label class="form-label">Full Name</label>
                    <input type="text" name="name" class="form-control" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Email</label>
                    <input type="email" name="email" class="form-control" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Role</label>
                    <select name="role" class="form-select">
                        <option value="Technician">Technician</option>
                        <option value="Maintenance Manager">Maintenance Manager</option>
                        <option value="Store Manager">Store Manager</option>
                        <option value="Admin">Admin</option>
                    </select>
                </div>
                <div class="mb-3">
                    <label class="form-label">Password (min 6 chars)</label>
                    <input type="password" name="password" class="form-control" required minlength="6">
                </div>
                <div class="mb-3">
                    <label class="form-label">Confirm Password</label>
                    <input type="password" name="confirm_password" class="form-control" required>
                </div>
                <button type="submit" class="btn btn-primary w-100">Register</button>
            </form>
            <p class="text-center mt-3 text-muted small">Already have an account? <a href="{{ url_for('auth.login') }}">Login</a></p>
        </div>
    </div>
</div>
{% endblock %}
