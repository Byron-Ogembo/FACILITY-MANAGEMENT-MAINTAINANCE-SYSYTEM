<!-- Chatbot Widget -->
<div id="chatbot-widget" class="chatbot-widget">
    <div class="chatbot-header">
        <span class="chatbot-title">Philron Assistant</span>
        <button id="chatbot-close-btn" class="chatbot-close">&times;</button>
    </div>
    <div class="chatbot-messages" id="chatbot-messages">
        <div class="message bot-message">
            Hello! I am Philron Assistant. How can I help you today?
        </div>
    </div>
    <div class="chatbot-input">
        <input type="text" id="chatbot-input-field" placeholder="Type a message..." autocomplete="off">
        <button id="chatbot-send-btn">Send</button>
    </div>
</div>
<!-- Chatbot Floating Toggle -->
<div id="chatbot-toggle-btn" class="chatbot-toggle-btn">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path>
    </svg>
</div>

<style>
/* Chatbot Styles */
.chatbot-widget {
    position: fixed;
    bottom: 80px;
    right: 20px;
    width: 380px;
    max-height: 520px;
    background: #ffffff;
    border-radius: 12px;
    box-shadow: 0 8px 24px rgba(0, 0, 0, 0.15);
    display: none;
    flex-direction: column;
    z-index: 1000;
    overflow: hidden;
    font-family: 'Inter', sans-serif;
    border: 1px solid #e2e8f0;
}

.chatbot-widget.active {
    display: flex;
}

.chatbot-header {
    background: #1e40af;
    color: white;
    padding: 12px 16px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-weight: 600;
}

.chatbot-title {
    font-size: 14px;
}

.chatbot-close {
    background: none;
    border: none;
    color: white;
    font-size: 20px;
    cursor: pointer;
}

.chatbot-messages {
    flex-grow: 1;
    height: 380px;
    overflow-y: auto;
    padding: 12px;
    display: flex;
    flex-direction: column;
    gap: 8px;
    background: #f8fafc;
}

.message {
    max-width: 80%;
    padding: 8px 12px;
    border-radius: 12px;
    font-size: 13px;
    line-height: 1.4;
}

.bot-message {
    background: #e2e8f0;
    color: #1e293b;
    align-self: flex-start;
    border-bottom-left-radius: 4px;
}

.user-message {
    background: #2563eb;
    color: white;
    align-self: flex-end;
    border-bottom-right-radius: 4px;
}

.chatbot-input {
    display: flex;
    padding: 10px;
    border-top: 1px solid #e2e8f0;
    background: #ffffff;
}

.chatbot-input input {
    flex-grow: 1;
    padding: 8px 12px;
    border: 1px solid #cbd5e1;
    border-radius: 20px;
    outline: none;
    font-size: 13px;
}

.chatbot-input button {
    background: #2563eb;
    color: white;
    border: none;
    border-radius: 20px;
    padding: 8px 16px;
    margin-left: 8px;
    cursor: pointer;
    font-size: 13px;
    font-weight: 500;
    transition: 0.2s;
}

.chatbot-input button:hover {
    background: #1d4ed8;
}

/* Toggle Button */
.chatbot-toggle-btn {
    position: fixed;
    bottom: 20px;
    right: 20px;
    width: 50px;
    height: 50px;
    background: #2563eb;
    color: white;
    border-radius: 50%;
    display: flex;
    justify-content: center;
    align-items: center;
    cursor: pointer;
    box-shadow: 0 4px 12px rgba(37, 99, 235, 0.4);
    z-index: 1000;
    transition: 0.3s;
}

.chatbot-toggle-btn:hover {
    transform: scale(1.05);
    background: #1e40af;
}

.typing-indicator {
    padding: 8px 12px;
    font-size: 13px;
    color: #64748b;
    font-style: italic;
    background: transparent;
}
</style>

<script src="{{ url_for('static', filename='js/chatbot.js') }}"></script>
