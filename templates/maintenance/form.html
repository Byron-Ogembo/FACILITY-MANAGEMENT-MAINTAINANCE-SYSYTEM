{% extends "base.html" %}
{% block title %}Add Maintenance Schedule{% endblock %}
{% block content %}
<h1 class="mb-4">Add Preventive Maintenance Schedule</h1>
<div class="card" style="max-width: 600px;">
    <div class="card-body">
        <form method="POST">
            <div class="mb-3">
                <label class="form-label">Equipment *</label>
                <select name="equipment_id" class="form-select" required>
                    <option value="">-- Select Equipment --</option>
                    {% for e in equipment %}
                    <option value="{{ e.id }}">{{ e.name }} ({{ e.location or e.category }})</option>
                    {% endfor %}
                </select>
            </div>
            <div class="mb-3">
                <label class="form-label">Task Name *</label>
                <input type="text" name="task_name" class="form-control" placeholder="e.g. Lubrication, Inspection" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Frequency *</label>
                <select name="frequency" class="form-select">
                    <option value="daily">Daily</option>
                    <option value="weekly">Weekly</option>
                    <option value="biweekly">Bi-weekly</option>
                    <option value="monthly" selected>Monthly</option>
                    <option value="quarterly">Quarterly</option>
                    <option value="annually">Annually</option>
                </select>
            </div>
            <div class="mb-3">
                <label class="form-label">Next Due Date *</label>
                <input type="date" name="next_due_date" class="form-control" value="{{ default_next }}" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Assigned To</label>
                <select name="assigned_to" class="form-select">
                    <option value="">-- Select Technician --</option>
                    {% for t in technicians %}
                    <option value="{{ t.id }}">{{ t.name }} ({{ t.role }})</option>
                    {% endfor %}
                </select>
            </div>
            <div class="mb-3">
                <label class="form-label">Notes</label>
                <textarea name="notes" class="form-control" rows="2"></textarea>
            </div>
            <button type="submit" class="btn btn-primary">Save</button>
            <a href="{{ url_for('maintenance.list_schedules') }}" class="btn btn-secondary">Cancel</a>
        </form>
    </div>
</div>
{% endblock %}
